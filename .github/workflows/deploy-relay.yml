name: Build & publish relay image

# The self-hosted Stofloos relay is a Bun + SQLite container (infra/relay/Dockerfile)
# deployed to your own Docker Swarm. This workflow builds the image and pushes it to
# GHCR; deploy it on your Swarm with `docker stack deploy -c infra/relay/stack.yml`
# after pointing the stack's image at the published tag. (Replaces the retired
# Alchemy/Cloudflare/PlanetScale deploy.)

on:
  push:
    branches:
      - main
    paths:
      - "infra/relay/**"
      - "packages/contracts/**"
      - "packages/shared/**"
      - "packages/client-runtime/**"
      - ".github/workflows/deploy-relay.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: relay-image
  cancel-in-progress: true

jobs:
  build_relay_image:
    name: Build & push relay image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/stofloos-relay
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/relay/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
