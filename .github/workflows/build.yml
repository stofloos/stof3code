name: Build (local)

# Local builds on GitHub-hosted runners — no EAS cloud, no Clerk.
# Desktop via electron-builder; mobile via `expo prebuild` + Gradle/Xcode.
# Set the RELAY_URL repository variable to your relay's https origin.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/build.yml"

permissions:
  contents: read

env:
  T3CODE_RELAY_URL: ${{ vars.RELAY_URL }}

jobs:
  desktop:
    name: Desktop (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            script: "dist:desktop:dmg:arm64"
          - name: windows-x64
            os: windows-latest
            script: "dist:desktop:win:x64"
          - name: linux-x64
            os: ubuntu-latest
            script: "dist:desktop:linux"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true
      - name: Enable pnpm
        run: corepack enable
      - name: Build app bundles
        run: vp run build:desktop
      - name: Package desktop artifact
        run: pnpm ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        with:
          name: stofloos-${{ matrix.name }}
          path: dist/Stofloos-*
          if-no-files-found: warn

  android:
    name: Mobile Android (local)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true
      - name: Enable pnpm
        run: corepack enable
      - name: Build Android APK (release, unsigned unless a keystore is configured)
        run: pnpm --filter @t3tools/mobile build:android
      - uses: actions/upload-artifact@v4
        with:
          name: stofloos-android
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  ios:
    name: Mobile iOS (local, unsigned)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true
      - name: Enable pnpm
        run: corepack enable
      - name: Prebuild iOS project
        run: pnpm --filter @t3tools/mobile prebuild:ios
      - name: Build (simulator, code signing disabled)
        run: |
          cd apps/mobile/ios
          xcodebuild -workspace Stofloos.xcworkspace -scheme Stofloos \
            -configuration Release -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO build
